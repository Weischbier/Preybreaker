name: Alpha Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: alpha-${{ github.ref }}
  cancel-in-progress: true

jobs:
  alpha:
    runs-on: ubuntu-latest

    env:
      CF_API_KEY: ${{ secrets.CF_API_KEY }}
      WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
      GITHUB_OAUTH: ${{ secrets.GHUB_OAUTH }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate publish secrets
        shell: bash
        run: |
          missing=0
          for var in CF_API_KEY WAGO_API_TOKEN GITHUB_OAUTH; do
            if [ -z "${!var}" ]; then
              echo "::error title=Missing secret::$var is not configured for this repository."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Package and publish alpha build
        uses: BigWigsMods/packager@v2

      - name: Locate packaged zip
        id: package
        shell: bash
        run: |
          archive_path=$(find .release -maxdepth 1 -type f -name '*.zip' | head -n 1)
          if [ -z "$archive_path" ]; then
            echo "::error title=Missing package::No packaged zip was found in .release."
            exit 1
          fi
          echo "archive_path=$archive_path" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub alpha prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARCHIVE_PATH: ${{ steps.package.outputs.archive_path }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          tag="alpha-${short_sha}"
          title="Alpha ${short_sha}"
          notes=$(cat <<EOF
          Automated alpha prerelease for commit ${short_sha}.

          Commit: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}
          Workflow: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          )

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "GitHub prerelease already exists for $tag"
            exit 0
          fi

          gh release create "$tag" "$ARCHIVE_PATH" \
            --target "$GITHUB_SHA" \
            --title "$title" \
            --notes "$notes" \
            --prerelease \
            --latest=false

      - name: Upload packaged zip
        uses: actions/upload-artifact@v4
        with:
          name: Preybreaker-alpha-${{ github.ref_name }}
          path: ${{ steps.package.outputs.archive_path }}
          if-no-files-found: error
          include-hidden-files: true
