name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      CF_API_KEY: ${{ secrets.CF_API_KEY }}
      WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
      GITHUB_OAUTH: ${{ secrets.GHUB_OAUTH }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release secrets
        shell: bash
        run: |
          missing=0
          for var in CF_API_KEY WAGO_API_TOKEN GITHUB_OAUTH; do
            if [ -z "${!var}" ]; then
              echo "::error title=Missing secret::$var is not configured for this repository."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Package and publish addon
        uses: BigWigsMods/packager@v2

      - name: Locate packaged zip
        id: package
        shell: bash
        run: |
          archive_path=$(find .release -maxdepth 1 -type f -name '*.zip' | head -n 1)
          if [ -z "$archive_path" ]; then
            echo "::error title=Missing package::No packaged zip was found in .release."
            exit 1
          fi
          echo "archive_path=$archive_path" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARCHIVE_PATH: ${{ steps.package.outputs.archive_path }}
        run: |
          tag="${GITHUB_REF_NAME}"
          prerelease=""
          latest="--latest"
          if [[ "$tag" == *-beta* ]] || [[ "$tag" == *-rc* ]]; then
            prerelease="--prerelease"
            latest="--latest=false"
          fi

          gh release create "$tag" "$ARCHIVE_PATH" \
            --title "$tag" \
            --generate-notes \
            $prerelease \
            $latest

      - name: Upload packaged zip
        uses: actions/upload-artifact@v4
        with:
          name: Preybreaker-release-${{ github.ref_name }}
          path: ${{ steps.package.outputs.archive_path }}
          if-no-files-found: error
          include-hidden-files: true
